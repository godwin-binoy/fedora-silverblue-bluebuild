# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
version: 1
name: fedora-silverblue-bluebuild
description: Hardware-optimized Fedora Silverblue for Intel Core Ultra (Meteor Lake / Arrow Lake / Lunar Lake)
base-image: ghcr.io/ublue-os/silverblue-main
image-version: "44"

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - rpmfusion.sh

  - type: dnf
    install:
      packages:
        # Video acceleration (VA-API / QuickSync) — Fedora official
        - libva-intel-media-driver
        - libva-intel-driver
        - libva-utils
        - gstreamer1-vaapi
        # Full multimedia (from RPMFusion)
        - ffmpeg
        # GPU compute (verified exist in Fedora 44)
        - intel-opencl
        - intel-level-zero
        # NPU (verified exists in Fedora 44)
        - intel-npu-driver
        # Diagnostics
        - intel-gpu-tools
        - fastfetch
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - gnome-tour
        - yelp
        - gnome-user-docs
        - rygel

  - type: kargs
    kargs:
      # CPU power management
      - intel_pstate=active
      - intel_idle.max_cstate=10
      # GPU: NO i915.* overrides — Meteor Lake defaults are optimal
      # (enable_guc=3, enable_psr=auto/PSR2, enable_dc=auto, enable_fbc=auto)
      # IOMMU (full DMA protection, no passthrough)
      - intel_iommu=on
      # Security hardening
      - init_on_alloc=1
      - init_on_free=1
      # NVMe power (reduces idle power ~0.5W)
      - nvme_core.default_ps_max_latency_us=5500
      # RCU tuning (reduces timer wakeups)
      - rcutree.rcu_idle_gp_delay=1
      # ACPI (reduces spurious EC wakeups)
      - acpi.ec_no_wakeup=1
      # THP (kernel-level, more reliable than tmpfiles.d)
      - transparent_hugepage=madvise
      # Boot UX
      - quiet
      - splash

  - type: systemd
    system:
      enabled:
        - thermald.service
        - disable-usb-wakeups.service
        - flatpak-automatic-upgrade.timer
      masked:
        - irqbalance.service

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - org.mozilla.firefox
          - org.gnome.Loupe
          - com.brave.Browser
          - com.mattjakeman.ExtensionManager

  - type: signing
