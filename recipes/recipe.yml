# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: fedora-silverblue-bluebuild
description: Core Ultra 5 x86-64-v3 Hyper-Optimized System Engine.
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44
modules:
  - type: files
    files:
      - source: system
        destination: /
  - type: dnf
    repos:
      copr:
        - bieszczaders/kernel-cachyos-addons
    install:
      packages:
        - intel-media-driver
        - libva-utils
        - gstreamer1-vaapi
        - intel-gpu-tools
        - fastfetch
        - intel-lpmd
        - scx-scheds
        - thermald
      skip-unavailable: true
      skip-broken: true
      allow-erasing: true
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - gnome-tour
        - yelp
        - gnome-user-docs
        - rygel
  - type: kargs
    kargs:
      - xe.force_probe=*
      - nmi_watchdog=0
      - nowatchdog
      - rcutree.rcu_idle_gp_delay=4
      - intel_pstate=active
      - split_lock_detect=off
      - quiet
      - splash
      - preempt=lazy
      - workqueue.power_efficient=y
      - xe.guc_log_level=0
      - pcie_aspm=force
      - iommu=pt
      - intel_iommu=on
      - init_on_alloc=1
      - init_on_free=1
      - page_alloc.shuffle=1
  - type: systemd
    system:
      enabled:
        - intel_lpmd.service
        - thermald.service
        - disable-usb-wakeups.service
        - flatpak-automatic-upgrade.timer
        - scx-power-init.service
        - scx_loader.service
      disabled:
        - NetworkManager-wait-online.service
  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - org.mozilla.firefox
          - org.gnome.Loupe
          - com.brave.Browser
          - com.mattjakeman.ExtensionManager
          - org.freedesktop.Platform.VAAPI.Intel
        overrides:
          global:
            - --device=dri
            - --socket=wayland
            - --socket=fallback-x11
      - scope: user
  - type: script
    scripts:
      - lpmd-multimodel.sh
      - setup-permissions.sh
  - type: signing
