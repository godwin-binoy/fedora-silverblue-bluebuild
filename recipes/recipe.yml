# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: fedora-silverblue-bluebuild
description: Core Ultra 5 x86-64-v3 Hyper-Optimized System Engine.

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44 # Fedora 44 release tracking

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - bieszczaders/kernel-cachyos        # CachyOS highly-optimized x86-64-v3 kernels
        - bieszczaders/kernel-cachyos-addons # Sched-ext eBPF scheduling tools
    install:
      packages:
        - kernel-cachyos                     # Replaces standard Fedora kernel
        - kernel-cachyos-devel-matched       # Header matching for modules
        - sched-ext-scx                      # eBPF scheduler control binaries
        - intel-lpmd                         # Low Power Mode Daemon
        - thermald                           # Intel thermal profile limits
        - intel-media-driver                 # HW Video acceleration runtime
        - libva-intel-driver
        - libva-utils
    remove:
      packages:
        - abrt
        - abrt-cli
        - abrt-desktop
        - abrt-addon-ccpp
        - abrt-addon-kerneloops
        - abrt-addon-pstoreoops
        - abrt-addon-xorg
        - abrt-libs
        - geoclue2
        - geoclue2-libs
        - firefox
        - firefox-langpacks
        - gnome-tour
        - yelp
        - yelp-libs
        - gnome-user-docs
        - rygel
        - speech-dispatcher
        - espeak-ng

  - type: kargs
    kargs:
      - xe.force_probe=*            # Forces modern Xe graphic driver for Intel Arc GPU
      - nmi_watchdog=0              # Stop CPU non-maskable hardware interrupts
      - nowatchdog                 # Disable internal hardware hang check timers
      - rcutree.rcu_idle_gp_delay=4 # Group CPU wake intervals to extend C-states
      - pcie_aspm=force             # Force active-state PCIe lane power management
      - nvme.noacpi=1               # Override buggy firmware APST states
      - ahci.mobile_lpm_policy=3    # Drive AHCI bus link power to lowest sleep level
      - intel_pstate=active         # Native Intel HWP active driver
      - quiet
      - splash

  - type: systemd
    system:
      enabled:
        - intel-lpmd.service
        - thermald.service
        - disable-usb-wakeups.service
        - scx.service                 # Automated eBPF scheduling launcher
      disabled:
        - geoclue.service
        - cups.service
        - power-profiles-daemon.service # Block conflicting power profiles daemon

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - org.mozilla.firefox
          - org.gnome.Loupe
      - scope: user

  - type: signing
