# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: fedora-silverblue-bluebuild
description: Core Ultra Dynamic HW-Optimized System Engine.
base-image: ghcr.io/ublue-os/silverblue-main
image-version: latest
modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - rpmfusion.sh

  - type: dnf
    install:
      packages:
        # Video acceleration (VA-API / QuickSync)
        - intel-media-driver
        - libva-intel-driver
        - libva-utils
        - gstreamer1-vaapi
        # Full multimedia (from RPMFusion)
        - ffmpeg
        # GPU compute (OpenCL + Level Zero)
        - intel-opencl
        - intel-level-zero
        # NPU
        - intel-npu-driver
        # Diagnostics
        - intel-gpu-tools
        - fastfetch
      skip-unavailable: true
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - gnome-tour
        - yelp
        - gnome-user-docs
        - rygel

  - type: kargs
    kargs:
      # CPU power management
      - intel_pstate=active
      - intel_idle.max_cstate=10
      # GPU power saving (i915 — Meteor Lake / Arrow Lake)
      - i915.enable_psr=1
      - i915.enable_dc=2
      - i915.enable_fbc=1
      - i915.enable_guc=2
      # IOMMU (full protection, no passthrough)
      - intel_iommu=on
      # Security hardening
      - lockdown=integrity
      - init_on_alloc=1
      - init_on_free=1
      # NVMe power
      - nvme_core.default_ps_max_latency_us=5500
      # RCU tuning
      - rcutree.rcu_idle_gp_delay=1
      # ACPI
      - acpi.ec_no_wakeup=1
      # Boot UX
      - quiet
      - splash

  - type: systemd
    system:
      enabled:
        - thermald.service
        - disable-usb-wakeups.service
        - flatpak-automatic-upgrade.timer
      masked:
        - irqbalance.service

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - org.mozilla.firefox
          - org.gnome.Loupe
          - com.brave.Browser
          - com.mattjakeman.ExtensionManager
          - org.freedesktop.Platform.VAAPI.Intel

  - type: signing
