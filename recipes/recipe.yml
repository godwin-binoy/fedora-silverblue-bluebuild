# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: fedora-silverblue-bluebuild
description: Core Ultra Dynamic HW-Optimized System Engine.
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44
modules:
  - type: files
    files:
      - source: system
        destination: /
  - type: dnf
    install:
      packages:
        - intel-media-driver
        - libva-utils
        - gstreamer1-vaapi
        - intel-gpu-tools
        - fastfetch
        - intel-lpmd
        - thermald
      skip-unavailable: true
      skip-broken: true
      allow-erasing: true
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - gnome-tour
        - yelp
        - gnome-user-docs
        - rygel
  - type: kargs
    kargs:
      - nmi_watchdog=0
      - nowatchdog
      - rcutree.rcu_idle_gp_delay=4
      - intel_pstate=active
      - split_lock_detect=off
      - quiet
      - splash
      - workqueue.power_efficient=y
      - pcie_aspm=auto
      - iommu=pt
      - intel_iommu=on
      - page_alloc.shuffle=1
  - type: systemd
    system:
      enabled:
        - ultra-hardware-init.service
        - thermald.service
        - disable-usb-wakeups.service
        - flatpak-automatic-upgrade.timer
  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - org.mozilla.firefox
          - org.gnome.Loupe
          - com.brave.Browser
          - com.mattjakeman.ExtensionManager
          - org.freedesktop.Platform.VAAPI.Intel
        overrides:
          org.mozilla.firefox:
            - --device=dri
            - --socket=wayland
            - --env=LIBVA_DRIVER_NAME=iHD
          com.brave.Browser:
            - --device=dri
            - --socket=wayland
            - --env=LIBVA_DRIVER_NAME=iHD
      - scope: user
  - type: signing
