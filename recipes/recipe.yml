# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: fedora-silverblue-bluebuild
description: Core Ultra 5 x86-64-v3 Hyper-Optimized System Engine.
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44
modules:
  - type: files
    files:
      - source: system
        destination: /
  - type: dnf
    install:
      packages:
        - intel-media-driver
        - libva-utils
        - gstreamer1-vaapi
        - intel-gpu-tools
        - fastfetch
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - gnome-tour
        - yelp
        - gnome-user-docs
        - rygel
  - type: kargs
    kargs:
      - xe.force_probe=*
      - nmi_watchdog=0
      - nowachtdog
      - rcutree.rcu_idle_gp_delay=4
      - intel_pstate=active
      - split_lock_detect=off
      - quiet
      - splash
      - preempt=lazy
      - workqueue.power_efficient=y
      - xe.guc_log_level=0
      - pcie_aspm=force
  - type: systemd
    system:
      enabled:
        - intel_lpmd.service
        - thermald.service
        - disable-usb-wakeups.service
        - flatpak-automatic-upgrade.timer
        - scx-power-init.service
      disabled:
        - NetworkManager-wait-online.service
  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - org.mozilla.firefox
          - org.gnome.Loupe
          - com.brave.Browser
          - com.mattjakeman.ExtensionManager
        overrides:
          global:
            - --device=dri
            - --socket=wayland
      - scope: user
  - type: script
    scripts:
      - compile-schemas.sh
      - lpmd-multimodel.sh
      - setup-permissions.sh
  - type: signing
