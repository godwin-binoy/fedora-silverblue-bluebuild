# Audio power management for Intel Core Ultra (SOF driver)
#
# NOTE: snd_sof does NOT have a dsp_power_save parameter.
# Power management is handled by WirePlumber session.suspend-timeout-seconds
# (configured in wireplumber.conf.d/20-audio-pacing.conf)
#
# snd_hda_intel is NOT the active driver on Meteor Lake+ (SOF is used).
# Uncomment below only for older HDA-based hardware:
# options snd_hda_intel power_save=1 power_save_controller=y
