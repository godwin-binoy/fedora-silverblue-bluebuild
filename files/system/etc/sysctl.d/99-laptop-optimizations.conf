# Optimize system memory compression with ZRAM
vm.swappiness = 180
vm.watermark_scale_factor = 125
vm.page-cluster = 0

# Maximize allocation limits to support memory-heavy applications
vm.max_map_count = 1048576

# Balanced SSD and VM page reclamation tuning
vm.dirty_background_ratio = 5
vm.dirty_ratio = 15
vm.compaction_proactiveness = 20

# Modern low-latency networking defaults (FQ pacing required for BBR)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Yama Ptrace Scope Restriction to block sandboxed process spying
kernel.yama.ptrace_scope = 1
