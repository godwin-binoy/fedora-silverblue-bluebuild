# Maximum utilization of ZRAM swap pool prior to physical allocation limits
vm.swappiness = 150

# Prevent system memory reclamation loops from stalling user interfaces
vm.watermark_scale_factor = 150

# Maximize allocation limits to support memory-heavy applications
vm.max_map_count = 1048576

# VM memory dirty pages optimization - safe SSD protection limits
vm.dirty_writeback_centisecs = 1500
vm.dirty_expire_centisecs = 3000
vm.dirty_background_ratio = 5
vm.dirty_ratio = 15

# Delay dirty page flushes when relying on ZRAM
vm.laptop_mode = 5

# Modern low-latency networking defaults (FQ pacing required for BBR)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
