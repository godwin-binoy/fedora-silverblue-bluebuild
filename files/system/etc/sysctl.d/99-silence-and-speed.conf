# Reduce swap usage (better responsiveness)
vm.swappiness=10
# Prevent timer migration across cores (reduce wakeups)
kernel.timer_migration=0
# Disable NUMA balancing (no benefit on single-socket laptops)
kernel.numa_balancing=0
# Tighten dirty page writeback (laptop optimised)
vm.dirty_background_ratio=5
vm.dirty_ratio=20
