context.properties = {
    default.clock.rate = 48000
    default.clock.quantum = 1024
    default.clock.min-quantum = 32     # Lower minimum quantum for real-time audio tasks
    default.clock.max-quantum = 2048
}

monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "~alsa_output.*"
      },
      {
        node.name = "~alsa_input.*"
      }
    ]
    actions = {
      update-props = {
        api.alsa.period-size = 1024
        api.alsa.headroom    = 512
        # Keep hardware link active for 15 seconds to prevent constant device sleep/wake cycling
        session.suspend-timeout-seconds = 15 
      }
    }
  }
]