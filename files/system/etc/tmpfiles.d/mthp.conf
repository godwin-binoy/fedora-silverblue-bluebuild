# Core Ultra Golden Ratio mTHP Configuration
# Balances extreme page-fault reduction with lowest CPU wake-state penalties

# Aggressive, safe defaults for typical user-space allocations
w /sys/kernel/mm/transparent_hugepage/hugepages-16kB/enabled - - - - always
w /sys/kernel/mm/transparent_hugepage/hugepages-32kB/enabled - - - - always
w /sys/kernel/mm/transparent_hugepage/hugepages-64kB/enabled - - - - always

# On-demand only (Allocates only when programs explicitly request large blocks via madvise)
w /sys/kernel/mm/transparent_hugepage/hugepages-128kB/enabled - - - - madvise
w /sys/kernel/mm/transparent_hugepage/hugepages-256kB/enabled - - - - madvise

# Standard PMD-level (2MB) hugepages set to madvise
w /sys/kernel/mm/transparent_hugepage/enabled - - - - madvise